<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="preload" as="image" href="/backgrounds/img1.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/backgrounds/result.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/loading_glass.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/char.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo.png" fetchpriority="high" />
    <link rel="preload" as="audio" href="/sounds/buttonClick.wav" type="audio/wav" />
    <link rel="preload" as="audio" href="/sounds/correct.wav" type="audio/wav" />
    <link rel="preload" as="audio" href="/sounds/mistake.wav" type="audio/wav" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111111;
        color: #f4f4f4;
      }

      body {
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(0, 0, 0, 0.44), rgba(0, 0, 0, 0.44)),
          linear-gradient(rgba(0, 0, 0, 0.44), rgba(0, 0, 0, 0.44)),
          url('/backgrounds/img1.webp') center / cover no-repeat;
      }

      #root {
        position: relative;
        z-index: 1;
        min-height: 100%;
      }

      .boot-loading-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .boot-loading-glass {
        width: 88px;
        height: 88px;
        image-rendering: pixelated;
        filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.28));
        transform-origin: 62% 64%;
        animation: boot-loading-float 2.3s linear infinite;
      }

      @keyframes boot-loading-float {
        0% {
          transform: translate3d(0px, 0px, 0) rotate(-4deg) scale(1);
        }
        12.5% {
          transform: translate3d(6px, -5px, 0) rotate(-2deg) scale(1.01);
        }
        25% {
          transform: translate3d(12px, 0px, 0) rotate(0deg) scale(1.015);
        }
        37.5% {
          transform: translate3d(6px, 5px, 0) rotate(1deg) scale(1.01);
        }
        50% {
          transform: translate3d(0px, 0px, 0) rotate(2deg) scale(1);
        }
        62.5% {
          transform: translate3d(-6px, -5px, 0) rotate(1deg) scale(1.01);
        }
        75% {
          transform: translate3d(-12px, 0px, 0) rotate(0deg) scale(1.015);
        }
        87.5% {
          transform: translate3d(-6px, 5px, 0) rotate(-2deg) scale(1.01);
        }
        100% {
          transform: translate3d(0px, 0px, 0) rotate(-4deg) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loading-glass {
          animation: none;
        }
      }
    </style>
    <title>devvit</title>
  </head>
  <body class="h-full">
    <div id="root" data-initial-screen="challenge" class="h-full">
      <div class="boot-loading-shell" aria-live="polite">
        <img class="boot-loading-glass" src="/loading_glass.png" alt="" />
      </div>
    </div>
    <script type="module" src="game.tsx"></script>
  </body>
</html>
